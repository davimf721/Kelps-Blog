server {
    listen $PORT;
    server_name _;
    root /app;
    index index.php;

    # Aumentar limite de upload para 15MB (garante margem para form data + 2 imagens de ~6MB cada)
    client_max_body_size 15M;

    # Servir arquivos estáticos diretamente
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Bloquear acesso a arquivos e diretórios sensíveis
    location ~* \.(env|sql|md|json|lock|log|yml|yaml)$ {
        deny all;
    }

    location ~ ^/(config|storage|database|docs|vendor)/ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    # Headers de segurança
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # PHP via FastCGI
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M \n memory_limit=128M";
        fastcgi_read_timeout 120;
    }
}
